<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sidi Imanuel - Final Perfect Layout</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Great+Vibes&family=Cinzel:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root { --liturgy-cream: #fdfaf5; --liturgy-brown: #4e342e; --liturgy-gold: #b59410; }
        body { font-family: 'Poppins', sans-serif; background: var(--liturgy-cream); margin: 0; display: flex; flex-direction: column; align-items: center; }

        /* HEADER & AYAT ALKITAB */
        .header { text-align: center; padding: 20px 15px; width: 100%; box-sizing: border-box; }
        .bible-verse { 
            font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.85rem; 
            max-width: 500px; margin: 15px auto 0; opacity: 0.85; line-height: 1.5;
            border-top: 1px solid rgba(181, 148, 16, 0.3); padding-top: 15px;
        }

        /* MENU PENGATURAN */
        .settings-panel { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 92%; max-width: 500px; background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .setting-group { display: flex; flex-direction: column; }
        .setting-group label { font-size: 0.7rem; font-weight: bold; color: var(--liturgy-gold); margin-bottom: 4px; }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ddd; font-family: 'Poppins'; background: #fff; outline: none; }

        /* KAMERA DAN BINGKAI LIVE */
        #polaroid-machine { width: 92%; max-width: 400px; background: #333; padding: 15px; border-radius: 20px 20px 0 0; position: relative; z-index: 5; }
        #camera-container { width: 100%; aspect-ratio: 1/1; background: #000; overflow: hidden; position: relative; border-radius: 8px; border: 8px solid #ffffff; transition: border-color 0.3s ease; }
        video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); transition: filter 0.3s; }
        #countdown { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Cinzel'; font-size: 80px; color: white; display: none; z-index: 10; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        #photo-slot { width: 92%; max-width: 400px; height: 25px; background: #ddd; border-radius: 0 0 15px 15px; position: relative; z-index: 6; transition: background 0.3s ease; }

        /* HASIL FOTO */
        #result-wrapper { width: 85%; max-width: 320px; margin-top: -15px; overflow: hidden; display: none; z-index: 1; }
        #final-image { width: 100%; display: block; transform: translateY(-100%); transition: transform 3.5s cubic-bezier(0.2, 0.8, 0.2, 1); box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #result-wrapper.printing #final-image { transform: translateY(15px); }

        /* TOMBOL */
        .btn-capture { width: 85%; max-width: 350px; background: #c0392b; color: white; border: none; padding: 18px; border-radius: 50px; font-family: 'Cinzel'; font-weight: bold; font-size: 1.2rem; margin: 30px 0; box-shadow: 0 6px 0 #8e1b10; cursor: pointer; }
        .btn-capture:active { transform: translateY(4px); box-shadow: 0 2px 0 #8e1b10; }
        .save-btn { background: var(--liturgy-gold); color: white; text-decoration: none; padding: 15px 40px; border-radius: 30px; font-weight: bold; display: inline-block; margin-top: 20px; box-shadow: 0 4px 10px rgba(181,148,16,0.3); }

        #flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: none; z-index: 99; }

        /* CREDIT PEMBUAT WEBSITE */
        .footer-credit {
            text-align: center;
            font-size: 0.75rem;
            color: var(--liturgy-brown);
            opacity: 0.6;
            padding: 10px 10px 30px;
            width: 100%;
            font-family: 'Poppins', sans-serif;
        }
    </style>
</head>
<body>

    <div id="flash"></div>

    <div class="header">
        <div style="color:var(--liturgy-gold); font-size: 28px; margin-bottom: 5px;">†</div>
        <h1 style="font-family:'Great Vibes'; font-size: 2.8rem; margin:0;">Peneguhan Sidi</h1>
        <p style="font-family:'Cinzel'; font-weight:bold; margin:0; font-size: 1rem;">Imanuel Christo Jauply</p>
        <div class="bible-verse">
            "Setiap orang yang mengakui Aku di depan manusia, Aku juga akan mengakui dia di depan Bapa-Ku yang di sorga." 
            <br><b style="display:inline-block; margin-top:8px;">— Matius 10:32 —</b>
        </div>
    </div>

    <div class="settings-panel">
        <div class="setting-group">
            <label>JENIS FRAME</label>
            <select id="mode-select">
                <option value="strip">Vintage Strip (4)</option>
                <option value="single">Single Polaroid (1)</option>
            </select>
        </div>
        <div class="setting-group">
            <label>WARNA FRAME</label>
            <select id="frame-color-select" onchange="updateLiveUI()">
                <option value="white">Classic White</option>
                <option value="gold">Royal Gold</option>
                <option value="dark">Midnight Devotion</option>
            </select>
        </div>
        <div class="setting-group" style="grid-column: span 2; margin-top: 5px;">
            <label>PILIH FILTER EFEK</label>
            <select id="filter-select" onchange="updateLiveUI()">
                <option value="none">Normal (Natural)</option>
                <option value="sepia(0.7) contrast(1.1)">Classic Sepia</option>
                <option value="grayscale(1) contrast(1.2)">Black & White</option>
            </select>
        </div>
    </div>

    <div id="polaroid-machine">
        <div id="camera-container">
            <video id="video" autoplay playsinline></video>
            <div id="countdown">3</div>
        </div>
    </div>
    <div id="photo-slot"></div>

    <div id="result-wrapper">
        <img id="final-image">
        <div style="text-align:center; padding-bottom: 50px; padding-top: 20px;">
            <a id="download-link" class="save-btn" href="#" download="Sidi-Imanuel-2026.png">SAVE AKANG FOTO NIH LAH RUBAH KALAKUANG!</a>
            <p onclick="location.reload()" style="color: var(--liturgy-brown); text-decoration:underline; cursor:pointer; margin-top:20px; font-size: 0.85rem; font-weight: bold;">Ambil Foto Baru</p>
        </div>
    </div>

    <button id="start-btn" class="btn-capture" onclick="startSequence()">MULAI FOTO</button>

    <div class="footer-credit">
        Dibuat dengan 🤎 oleh <b>Gian Jauply Pica Sadap</b>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const filterSelect = document.getElementById('filter-select');
        const modeSelect = document.getElementById('mode-select');
        const frameColorSelect = document.getElementById('frame-color-select');
        const camContainer = document.getElementById('camera-container');
        const photoSlot = document.getElementById('photo-slot');
        const resultWrapper = document.getElementById('result-wrapper');
        const finalImage = document.getElementById('final-image');
        const flash = document.getElementById('flash');
        
        let capturedImages = [];

        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { video.srcObject = stream; })
            .catch(err => alert("Kamera tidak dapat diakses."));

        // Update bingkai kamera secara LIVE
        function updateLiveUI() {
            video.style.filter = filterSelect.value;

            const theme = frameColorSelect.value;
            if(theme === 'white') {
                camContainer.style.borderColor = '#ffffff';
                photoSlot.style.background = '#dddddd';
            } else if(theme === 'gold') {
                camContainer.style.borderColor = '#fcf4d9';
                photoSlot.style.background = '#d4c59a';
            } else if(theme === 'dark') {
                camContainer.style.borderColor = '#1a1a1a';
                photoSlot.style.background = '#111111';
            }
        }
        updateLiveUI();

        async function startSequence() {
            capturedImages = [];
            resultWrapper.classList.remove('printing');
            resultWrapper.style.display = 'none';
            document.getElementById('start-btn').disabled = true;
            
            const count = modeSelect.value === 'strip' ? 4 : 1;

            for (let i = 0; i < count; i++) {
                await doCountdown(3);
                flash.style.display = 'block';
                setTimeout(() => flash.style.display = 'none', 100);
                capturePhoto();
                if(i < count - 1) await new Promise(r => setTimeout(r, 800)); 
            }
            combinePhotos();
            document.getElementById('start-btn').disabled = false;
        }

        function doCountdown(sec) {
            return new Promise(r => {
                let c = sec;
                const el = document.getElementById('countdown');
                el.style.display = 'block'; el.innerText = c;
                let t = setInterval(() => {
                    c--;
                    if(c <= 0) { clearInterval(t); el.style.display='none'; r(); }
                    else el.innerText = c;
                }, 1000);
            });
        }

        function capturePhoto() {
            const temp = document.createElement('canvas');
            temp.width = 800; temp.height = 800;
            const tCtx = temp.getContext('2d');
            
            tCtx.filter = filterSelect.value === 'none' ? 'none' : filterSelect.value;
            tCtx.translate(800, 0); tCtx.scale(-1, 1);
            tCtx.drawImage(video, 0, 0, 800, 800);
            
            capturedImages.push(temp.toDataURL('image/png'));
        }

        function combinePhotos() {
            const ctx = canvas.getContext('2d');
            const mode = modeSelect.value;
            const theme = frameColorSelect.value;

            // 1. ATUR UKURAN CANVAS DULU
            if(mode === 'strip') {
                canvas.width = 500;
                canvas.height = 2300; 
            } else {
                canvas.width = 800;
                canvas.height = 1200; 
            }
            
            // 2. SETELAH UKURAN DIATUR, BARU MASUKAN WARNA FRAME
            if(theme === 'white') {
                ctx.fillStyle = "#ffffff";
            } else if(theme === 'gold') {
                ctx.fillStyle = "#fcf4d9";
            } else if(theme === 'dark') {
                ctx.fillStyle = "#111111"; // Hitam
            }

            // 3. WARNAI KESELURUHAN CANVAS
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 4. TEMPEL FOTONYA
            let loaded = 0;
            capturedImages.forEach((src, i) => {
                const img = new Image();
                img.onload = () => {
                    if(mode === 'strip') ctx.drawImage(img, 40, 40 + (i * 480), 420, 420);
                    else ctx.drawImage(img, 50, 50, 700, 700);
                    
                    loaded++;
                    if(loaded === capturedImages.length) {
                        drawFooter(ctx, theme, mode);
                    }
                };
                img.src = src;
            });
        }

        function drawFooter(ctx, theme, mode) {
            const w = canvas.width;
            const h = canvas.height;
            const isStrip = mode === 'strip';
            
            // WARNA TEKS OTOMATIS
            let mainColor, goldColor, dateColor;
            
            if(theme === 'dark') {
                mainColor = "#ffffff"; 
                goldColor = "#f1c40f"; 
                dateColor = "#cccccc"; 
            } else {
                mainColor = "#4e342e"; 
                goldColor = "#b59410"; 
                dateColor = "#8d6e63"; 
            }

            const footerY = h - (isStrip ? 350 : 380); 
            ctx.textAlign = "center";

            ctx.fillStyle = goldColor;
            ctx.font = (isStrip ? "40px" : "60px") + " 'Cinzel'";
            ctx.fillText("†", w/2, footerY + 50);

            ctx.fillStyle = mainColor;
            ctx.font = "italic " + (isStrip ? "50px" : "80px") + " 'Great Vibes'";
            ctx.fillText("Peneguhan sidi", w/2, footerY + (isStrip ? 110 : 150));

            ctx.font = "bold " + (isStrip ? "26px" : "45px") + " 'Playfair Display'";
            ctx.fillText("Imanuel Christo Jauply", w/2, footerY + (isStrip ? 155 : 210));

            ctx.fillStyle = goldColor;
            ctx.font = "bold " + (isStrip ? "16px" : "24px") + " 'Poppins'";
            ctx.fillText("MENGAKU & SETIA KEPADA-NYA", w/2, footerY + (isStrip ? 190 : 260));

            ctx.fillStyle = dateColor;
            ctx.font = (isStrip ? "15px" : "22px") + " 'Poppins'";
            ctx.fillText("29 MARET 2026", w/2, footerY + (isStrip ? 220 : 300));

            ctx.font = (isStrip ? "35px" : "55px") + " Arial";
            ctx.fillText("🕊️", w * 0.15, footerY + 130);
            ctx.fillText("📖", w * 0.85, footerY + 130);

            finalImage.src = canvas.toDataURL('image/png');
            document.getElementById('download-link').href = finalImage.src;
            
            resultWrapper.style.display = 'block';
            setTimeout(() => {
                resultWrapper.classList.add('printing');
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 50);
        }
    </script>
</body>
</html>
